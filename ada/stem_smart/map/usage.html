<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>UK Schools Map</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.css" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet.markercluster/1.5.3/MarkerCluster.Default.css" />
<style>
  :root{
    --bg: #12181b;
    --panel: #1b2327;
    --ink: #eef2f0;
    --muted: #93a29d;
    --line: #2c3639;
    --accent: #ff8a3d;
  }
  * { box-sizing: border-box; }
  html, body { margin:0; padding:0; height:100%; background:var(--bg); color:var(--ink); font-family: 'Segoe UI', system-ui, -apple-system, sans-serif; }
  #wrap { display:flex; flex-direction:column; height:100vh; }
  header {
    padding: 14px 18px 10px;
    border-bottom: 1px solid var(--line);
    display:flex; align-items:baseline; justify-content:space-between; gap:12px; flex-wrap:wrap;
  }
  header h1 { font-size: 16px; margin:0; font-weight:600; letter-spacing:.2px; }
  header .count { font-size:12px; color:var(--muted); }
  #searchBox {
    padding: 10px 18px;
    border-bottom: 1px solid var(--line);
    background: var(--panel);
  }
  #searchBox input {
    width: 100%;
    max-width: 360px;
    background: #0e1416;
    border: 1px solid var(--line);
    color: var(--ink);
    padding: 7px 10px;
    border-radius: 6px;
    font-size: 13px;
  }
  #searchBox input:focus { outline: 1px solid var(--accent); }
  #main { flex:1; display:flex; min-height:0; }
  #map { flex:1; }
  #legend {
    width: 240px;
    background: var(--panel);
    border-left: 1px solid var(--line);
    padding: 14px;
    overflow-y:auto;
    font-size: 13px;
  }
  #legend h2 { font-size:11px; text-transform:uppercase; letter-spacing:.08em; color:var(--muted); margin:0 0 10px; font-weight:600; }
  .legend-item {
    display:flex; align-items:center; gap:8px; padding:5px 6px; border-radius:6px; cursor:pointer;
    user-select:none;
  }
  .legend-item:hover { background: rgba(255,255,255,0.04); }
  .legend-item.off { opacity: 0.35; }
  .swatch { width:11px; height:11px; border-radius:50%; flex-shrink:0; }
  .legend-label { flex:1; }
  .legend-n { color:var(--muted); font-variant-numeric: tabular-nums; font-size:12px; }
  .leaflet-popup-content-wrapper { background:#1e2a2e; color:var(--ink); border-radius:8px; }
  .leaflet-popup-tip { background:#1e2a2e; }
  .popup-title { font-size:14px; font-weight:700; margin-bottom:4px; color:var(--ink); }
  .popup-row { font-size:12.5px; line-height:1.6; color:var(--muted); }
  .popup-row b { color:var(--ink); font-weight:600; }
  @media (max-width: 640px) {
    #main { flex-direction: column; }
    #legend { width:100%; border-left:none; border-top:1px solid var(--line); max-height: 160px; }
  }
</style>
</head>
<body>
<div id="wrap">
  <header>
    <h1>UK Schools Map</h1>
    <span class="count" id="countLabel">loading…</span>
  </header>
  <div id="searchBox">
    <input type="text" id="searchInput" placeholder="Search by school name or postcode…" />
  </div>
  <div id="main">
    <div id="map"></div>
    <div id="legend">
      <h2>School type — click to filter</h2>
      <div id="legendList"></div>
      <h2 style="margin-top:18px;">Marker size</h2>
      <div style="color:var(--muted); font-size:12px; line-height:1.5;">Bigger dot = more uses/attempts recorded for that school.</div>
    </div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

const allMarkers = [];

function popupHtml(d) {
  const pupils = d.pupils ? `${d.pupils} pupils` : null;
  const fsm = d.fsm ? `${d.fsm}% FSM` : null;
  const statLine = [pupils, fsm].filter(Boolean).join(' · ');
  return `
    <div class="popup-title">${d.name}</div>
    <div class="popup-row"><b>Uses:</b> ${d.uses.toLocaleString()}</div>
    <div class="popup-row"><b>Type:</b> ${d.type}${d.school_type ? ' — ' + d.school_type : ''}</div>
    <div class="popup-row"><b>Phase:</b> ${d.phase}${d.gender ? ' · ' + d.gender : ''}</div>
    ${statLine ? `<div class="popup-row"><b>Roll:</b> ${statLine}</div>` : ''}
    <div class="popup-row"><b>LA:</b> ${d.la || '—'}</div>
    <div class="popup-row"><b>Postcode:</b> ${d.postcode || '—'}</div>
  `;
}

// scale factor for marker radius by usage (sqrt scale keeps outliers from dominating)
const maxUses = Math.max(...SCHOOL_DATA.map(d => d.uses), 1);
function radiusForUses(u) {
  const minR = 5, maxR = 18;
  const t = Math.sqrt(u) / Math.sqrt(maxUses);
  return minR + t * (maxR - minR);
}

types.forEach(t => {
  const cluster = L.markerClusterGroup({
    maxClusterRadius: 45,
    iconCreateFunction: function(cl) {
      const count = cl.getChildCount();
      const size = count < 10 ? 30 : count < 50 ? 36 : count < 200 ? 44 : 52;
      return L.divIcon({
        html: `<div style="
          background:${colorOf[t]}cc;
          border:2px solid ${colorOf[t]};
          color:#0d1315;
          width:${size}px;height:${size}px;border-radius:50%;
          display:flex;align-items:center;justify-content:center;
          font-weight:700;font-size:${count<50?12:13}px;font-family:inherit;">
          ${count}</div>`,
        className: '',
        iconSize: [size, size]
      });
    }
  });
  clusterGroups[t] = cluster;
  activeState[t] = true;
});

SCHOOL_DATA.forEach(d => {
  const marker = L.circleMarker([d.lat, d.lon], {
    radius: radiusForUses(d.uses),
    color: colorOf[d.type],
    fillColor: colorOf[d.type],
    fillOpacity: 0.85,
    weight: 1.5
  });
  marker.bindPopup(popupHtml(d));
  marker._schoolData = d;
  clusterGroups[d.type].addLayer(marker);
  allMarkers.push(marker);
});

types.forEach(t => clusterGroups[t].addTo(map));

document.getElementById('countLabel').textContent = `${SCHOOL_DATA.length.toLocaleString()} schools`;

const legendList = document.getElementById('legendList');
types.forEach(t => {
  const n = SCHOOL_DATA.filter(d => d.type === t).length;
  const item = document.createElement('div');
  item.className = 'legend-item';
  item.innerHTML = `
    <span class="swatch" style="background:${colorOf[t]}"></span>
    <span class="legend-label">${t}</span>
    <span class="legend-n">${n}</span>
  `;
  item.addEventListener('click', () => {
    activeState[t] = !activeState[t];
    item.classList.toggle('off', !activeState[t]);
    if (activeState[t]) {
      map.addLayer(clusterGroups[t]);
    } else {
      map.removeLayer(clusterGroups[t]);
    }
  });
  legendList.appendChild(item);
});

// Search
const searchInput = document.getElementById('searchInput');
let searchTimeout;

function runSearch() {
  const q = searchInput.value.trim().toLowerCase();
  if (q.length < 3) return;
  const match = allMarkers.find(m =>
    m._schoolData.name.toLowerCase().includes(q) ||
    (m._schoolData.postcode || '').toLowerCase().includes(q)
  );
  if (match) {
    const group = clusterGroups[match._schoolData.type];
    // zoomToShowLayer handles zooming/spiderfying so the individual marker becomes visible
    group.zoomToShowLayer(match, () => {
      match.openPopup();
    });
  }
}

searchInput.addEventListener('input', () => {
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(runSearch, 400);
});
searchInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    clearTimeout(searchTimeout);
    runSearch();
  }
});
</script>
</body>
</html>
